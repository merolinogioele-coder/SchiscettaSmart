<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrati | SchiscettaSmart</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="auth-page register-page">

    <div class="leaf-top-right small"></div>
    <div class="leaf-bottom-left small"></div>

    <div class="register-layout">
        <a href="index.html" class="logo-container" style="text-decoration:none">
            <div class="logo-icon">🍲</div>
            <div class="logo-text">Schiscetta<span>Smart</span></div>
        </a>

        <div class="register-form-content">
            <h1>Inizia con SchiscettaSmart 🌿</h1>
            <p class="auth-subtitle">Registrati per iniziare a pianificare i tuoi pasti</p>

            <div id="auth-error" class="error-box hidden"></div>
            <div id="auth-success" class="success-box hidden"></div>

            <form id="register-form">
                <div class="form-group">
                    <input type="email" id="email" placeholder="La tua e-mail" required autocomplete="email">
                </div>
                <div class="form-group">
                    <input type="password" id="password" placeholder="Crea una password" required autocomplete="new-password" minlength="6">
                </div>
                <div class="form-group">
                    <input type="password" id="confirm-password" placeholder="Ripeti la password" required autocomplete="new-password">
                </div>
                <button type="submit" id="register-btn" class="primary-btn full-width">Registrati</button>
            </form>

            <div class="auth-divider"><span>oppure</span></div>
            <p class="auth-link-text">Hai già un account? <a href="login.html">Accedi</a></p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="auth.js"></script>
    <script>
        checkAuthAndRedirect('dashboard.html');

        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('register-btn');
            const errorBox = document.getElementById('auth-error');
            const successBox = document.getElementById('auth-success');

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirm-password').value;

            errorBox.classList.add('hidden');
            successBox.classList.add('hidden');

            if (password !== confirm) {
                errorBox.textContent = 'Le password non coincidono.';
                errorBox.classList.remove('hidden');
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Registrazione in corso...';

            const { error } = await supabaseClient.auth.signUp({ email, password });

            if (error) {
                errorBox.textContent = error.message;
                errorBox.classList.remove('hidden');
                btn.disabled = false;
                btn.textContent = 'Registrati';
            } else {
                successBox.textContent = '✅ Registrazione completata! Controlla la tua email per confermare il tuo account, poi accedi.';
                successBox.classList.remove('hidden');
                btn.textContent = 'Fatto!';
                setTimeout(() => { window.location.href = 'login.html'; }, 3000);
            }
        });
    </script>
</body>
</html>
